<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>our board</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --border: #2e2e2e;
  --text: #f0f0f0; --muted: #888; --accent: #c8f135;
  --note: #f5c542; --link: #60b8ff; --img: #a78bfa; --announce: #fb923c;
  --danger: #f87171; --radius: 10px;
  --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; display: flex; flex-direction: column; transition: background 0.2s, color 0.2s; }

#lock-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
.lock-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; display: flex; flex-direction: column; gap: 12px; width: 300px; text-align: center; }
.lock-box h2 { font-family: var(--mono); font-size: 16px; color: var(--accent); font-weight: 500; }
.lock-box p { font-size: 13px; color: var(--muted); }
.lock-box input { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 14px; padding: 8px 12px; outline: none; text-align: center; letter-spacing: 0.1em; transition: border-color 0.15s; }
.lock-box input:focus { border-color: var(--accent); }
.lock-btn { background: var(--accent); color: #0f0f0f; border: none; border-radius: 6px; padding: 8px; font-family: var(--mono); font-size: 13px; font-weight: 500; cursor: pointer; }
.lock-error { font-size: 12px; color: var(--danger); display: none; }

header { border-bottom: 1px solid var(--border); padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); backdrop-filter: blur(12px); z-index: 100; gap: 10px; flex-wrap: wrap; }
.logo { font-family: var(--mono); font-size: 15px; color: var(--accent); cursor: pointer; border-bottom: 1px dashed transparent; transition: border-color 0.15s; }
.logo:hover { border-color: var(--accent); }
.logo-edit { display: none; font-family: var(--mono); font-size: 15px; color: var(--accent); background: transparent; border: none; border-bottom: 1px solid var(--accent); outline: none; width: 160px; }
.header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.live-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); font-family: var(--mono); }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; animation: blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.online-count { font-size: 12px; color: #22c55e; font-family: var(--mono); }
.icon-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); cursor: pointer; padding: 5px 8px; font-size: 15px; transition: all 0.15s; position: relative; }
.icon-btn:hover { border-color: var(--text); color: var(--text); }
.notif-dot::after { content: ''; position: absolute; top: 2px; right: 2px; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: none; }
.notif-dot.has-notif::after { display: block; }

.rooms-bar { display: flex; gap: 6px; padding: 0.6rem 1rem; border-bottom: 1px solid var(--border); overflow-x: auto; background: var(--bg); }
.room-btn { font-family: var(--mono); font-size: 12px; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.room-btn.active { background: var(--accent); color: #0f0f0f; border-color: var(--accent); font-weight: 500; }
.room-btn:hover:not(.active) { border-color: var(--muted); color: var(--text); }
.add-room-btn { font-family: var(--mono); font-size: 12px; padding: 4px 10px; border-radius: 20px; border: 1px dashed var(--border); background: transparent; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.add-room-btn:hover { border-color: var(--accent); color: var(--accent); }

.typing-bar { min-height: 20px; font-size: 12px; color: var(--muted); font-family: var(--mono); padding: 0.3rem 0; font-style: italic; }

.stats-bar { display: flex; gap: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.7rem 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
.stat { display: flex; flex-direction: column; gap: 2px; }
.stat-val { font-family: var(--mono); font-size: 16px; font-weight: 500; color: var(--accent); }
.stat-label { font-size: 11px; color: var(--muted); }

main { max-width: 700px; margin: 0 auto; width: 100%; padding: 1.25rem 1rem 4rem; flex: 1; }
.search-bar { display: flex; gap: 8px; margin-bottom: 1rem; }
.search-bar input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--font); font-size: 14px; padding: 8px 12px; outline: none; transition: border-color 0.15s; }
.search-bar input:focus { border-color: var(--accent); }
.sort-btn { font-family: var(--mono); font-size: 12px; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.sort-btn.active { color: var(--accent); border-color: var(--accent); }

.compose { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-bottom: 1.25rem; }
.name-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
.name-row input[type=text] { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--font); font-size: 13px; padding: 6px 10px; width: 140px; outline: none; transition: border-color 0.15s; }
.name-row input[type=text]:focus { border-color: var(--accent); }
.name-row input[type=color] { width: 30px; height: 28px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; background: none; padding: 0; }
.tabs { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.tab { font-size: 12px; font-family: var(--mono); padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; }
.tab.active-note     { background: rgba(245,197,66,0.15); color: var(--note); border-color: rgba(245,197,66,0.3); }
.tab.active-link     { background: rgba(96,184,255,0.15); color: var(--link); border-color: rgba(96,184,255,0.3); }
.tab.active-image    { background: rgba(167,139,250,0.15); color: var(--img); border-color: rgba(167,139,250,0.3); }
.tab.active-announce { background: rgba(251,146,60,0.15); color: var(--announce); border-color: rgba(251,146,60,0.3); }
.tab.active-poll     { background: rgba(200,241,53,0.15); color: var(--accent); border-color: rgba(200,241,53,0.3); }
textarea, .compose input[type=text] { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--font); font-size: 14px; padding: 8px 10px; outline: none; resize: vertical; min-height: 72px; line-height: 1.6; transition: border-color 0.15s; }
.compose input[type=text] { min-height: unset; resize: none; }
textarea:focus, .compose input[type=text]:focus { border-color: var(--accent); }
.img-preview { max-width: 100%; max-height: 150px; border-radius: 6px; margin-top: 8px; display: none; object-fit: cover; }
.poll-options { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
.poll-option-row { display: flex; gap: 6px; }
.poll-option-row input { flex: 1; }
.remove-opt { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); cursor: pointer; padding: 4px 8px; font-size: 12px; }
.add-opt-btn { font-size: 12px; font-family: var(--mono); color: var(--muted); background: none; border: 1px dashed var(--border); border-radius: 6px; padding: 5px 12px; cursor: pointer; margin-top: 4px; transition: all 0.15s; }
.add-opt-btn:hover { color: var(--accent); border-color: var(--accent); }
.post-btn { background: var(--accent); color: #0f0f0f; border: none; border-radius: 6px; padding: 7px 18px; font-family: var(--mono); font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.15s, transform 0.1s; margin-top: 10px; }
.post-btn:hover { opacity: 0.88; }
.post-btn:active { transform: scale(0.97); }

.announce-banner { background: rgba(251,146,60,0.1); border: 1.5px solid rgba(251,146,60,0.4); border-radius: var(--radius); padding: 0.9rem 1rem; margin-bottom: 10px; animation: fadeIn 0.2s ease; }
.announce-banner .card-meta { margin-bottom: 6px; }
.announce-body { font-size: 14px; line-height: 1.65; color: var(--text); word-break: break-word; white-space: pre-wrap; font-weight: 500; }

.posts { display: flex; flex-direction: column; gap: 10px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.9rem 1rem; animation: fadeIn 0.2s ease; }
.card.pinned { border-color: var(--accent); border-width: 1.5px; }
.pin-label { font-family: var(--mono); font-size: 10px; color: var(--accent); margin-bottom: 6px; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; flex-wrap: wrap; }
.avatar { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; flex-shrink: 0; font-family: var(--mono); }
.badge { font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 20px; }
.badge-note     { background: rgba(245,197,66,0.15); color: var(--note); }
.badge-link     { background: rgba(96,184,255,0.15); color: var(--link); }
.badge-image    { background: rgba(167,139,250,0.15); color: var(--img); }
.badge-announce { background: rgba(251,146,60,0.15); color: var(--announce); }
.badge-poll     { background: rgba(200,241,53,0.15); color: var(--accent); }
.card-time { font-size: 11px; color: var(--muted); font-family: var(--mono); cursor: default; position: relative; }
.card-time:hover::after { content: attr(data-full); position: absolute; bottom: 120%; left: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px; font-size: 11px; white-space: nowrap; z-index: 50; }
.card-actions { margin-left: auto; display: flex; align-items: center; gap: 4px; }
.act-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 14px; padding: 2px 4px; border-radius: 4px; transition: color 0.15s, background 0.15s; line-height: 1; }
.act-btn:hover { color: var(--text); background: var(--surface2); }
.act-btn.pinned { color: var(--accent); }
.card-body { font-size: 14px; line-height: 1.65; color: var(--text); word-break: break-word; white-space: pre-wrap; opacity: 0.88; }
.card-body a { color: var(--link); text-decoration: none; }
.card-body a:hover { text-decoration: underline; }
.card-img { max-width: 100%; border-radius: 6px; margin-top: 8px; display: block; max-height: 260px; object-fit: cover; }
.edit-area { width: 100%; background: var(--surface2); border: 1px solid var(--accent); border-radius: 6px; color: var(--text); font-family: var(--font); font-size: 14px; padding: 8px 10px; outline: none; resize: vertical; min-height: 60px; line-height: 1.6; margin-top: 6px; }
.edit-actions { display: flex; gap: 6px; margin-top: 6px; }
.edit-save { background: var(--accent); color: #0f0f0f; border: none; border-radius: 6px; padding: 5px 14px; font-family: var(--mono); font-size: 12px; cursor: pointer; }
.edit-cancel { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 5px 14px; font-family: var(--mono); font-size: 12px; color: var(--muted); cursor: pointer; }

.vote-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.vote-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 13px; cursor: pointer; color: var(--muted); font-family: var(--mono); transition: all 0.15s; }
.vote-btn:hover { border-color: var(--muted); color: var(--text); }
.vote-btn.voted-up { color: #4ade80; border-color: #4ade80; }
.vote-btn.voted-down { color: var(--danger); border-color: var(--danger); }
.vote-score { font-family: var(--mono); font-size: 14px; font-weight: 500; min-width: 24px; text-align: center; }

.poll-card { margin-top: 8px; }
.poll-question { font-size: 14px; font-weight: 500; margin-bottom: 10px; color: var(--text); }
.poll-opt { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; cursor: pointer; }
.poll-opt-bar-wrap { flex: 1; background: var(--surface2); border-radius: 4px; height: 28px; overflow: hidden; position: relative; border: 1px solid var(--border); }
.poll-opt-bar { height: 100%; background: rgba(200,241,53,0.2); border-radius: 4px; transition: width 0.4s ease; }
.poll-opt-bar.voted { background: rgba(200,241,53,0.4); }
.poll-opt-label { position: absolute; inset: 0; display: flex; align-items: center; padding: 0 8px; font-size: 13px; color: var(--text); justify-content: space-between; }
.poll-pct { font-family: var(--mono); font-size: 11px; color: var(--muted); }

.reactions-bar { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; align-items: center; position: relative; }
.reaction-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 9px; font-size: 13px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 4px; color: var(--text); }
.reaction-btn.reacted { border-color: var(--accent); background: rgba(200,241,53,0.1); }
.reaction-count { font-size: 11px; font-family: var(--mono); color: var(--muted); }
.add-reaction { background: none; border: 1px dashed var(--border); border-radius: 20px; padding: 3px 9px; font-size: 13px; cursor: pointer; color: var(--muted); transition: all 0.15s; }
.add-reaction:hover { border-color: var(--muted); color: var(--text); }
.emoji-picker { position: absolute; top: 110%; left: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px; display: flex; gap: 6px; flex-wrap: wrap; width: 200px; z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
.emoji-picker button { background: none; border: none; font-size: 18px; cursor: pointer; padding: 2px; border-radius: 4px; transition: background 0.1s; }
.emoji-picker button:hover { background: var(--surface2); }

.comments-section { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
.comment { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-start; }
.comment-avatar { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 600; flex-shrink: 0; font-family: var(--mono); }
.comment-content { flex: 1; }
.comment-name { font-size: 11px; font-weight: 500; color: var(--muted); }
.comment-text { font-size: 13px; line-height: 1.5; color: var(--text); opacity: 0.85; white-space: pre-wrap; word-break: break-word; }
.comment-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 11px; padding: 0 2px; transition: color 0.15s; }
.comment-del:hover { color: var(--danger); }
.comment-form { display: flex; gap: 6px; margin-top: 6px; }
.comment-form input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--font); font-size: 12px; padding: 5px 8px; outline: none; transition: border-color 0.15s; }
.comment-form input:focus { border-color: var(--accent); }
.comment-form button { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 12px; padding: 5px 10px; cursor: pointer; font-family: var(--mono); transition: all 0.15s; }
.comment-form button:hover { color: var(--text); border-color: var(--muted); }
.toggle-comments { background: none; border: none; color: var(--muted); font-size: 12px; cursor: pointer; font-family: var(--mono); padding: 0; margin-top: 8px; transition: color 0.15s; }
.toggle-comments:hover { color: var(--text); }
.empty { text-align: center; color: var(--muted); font-size: 14px; padding: 3rem 0; font-family: var(--mono); }
.section-label { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.05em; }
.notif-toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--surface); border: 1px solid var(--accent); border-radius: 8px; padding: 10px 16px; font-size: 13px; font-family: var(--mono); color: var(--accent); z-index: 999; animation: slideUp 0.2s ease; max-width: 280px; }
@keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
.link-preview { margin-top: 8px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; display: none; }
.link-preview-inner { padding: 10px 12px; }
.link-preview-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
.link-preview-desc { font-size: 12px; color: var(--muted); line-height: 1.4; }
.link-preview-url { font-size: 11px; color: var(--link); font-family: var(--mono); margin-top: 4px; }
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-box">
    <h2>// our board</h2>
    <p>enter the password to get in</p>
    <input type="password" id="pw-input" placeholder="password" onkeydown="if(event.key==='Enter')tryUnlock()" />
    <div class="lock-error" id="pw-error">wrong password, try again</div>
    <button class="lock-btn" onclick="tryUnlock()">enter →</button>
    <p style="font-size:11px;color:var(--muted)">default: <strong style="color:var(--accent);font-family:var(--mono)">ourboard</strong></p>
  </div>
</div>

<header>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="logo" id="logo-text" onclick="startEditName()" title="click to rename">// our board</span>
    <input class="logo-edit" id="logo-edit" onblur="saveName()" onkeydown="if(event.key==='Enter')saveName()" maxlength="30" />
  </div>
  <div class="header-right">
    <span class="online-count" id="online-count">● 1 online</span>
    <div class="live-badge"><div class="live-dot"></div> live</div>
    <button class="icon-btn notif-dot" id="notif-btn" onclick="clearNotif()" title="notifications">🔔</button>
    
  </div>
</header>

<div class="rooms-bar" id="rooms-bar">
  <button class="room-btn active" data-room="general" onclick="switchRoom('general',this)"># general</button>
  <button class="room-btn" data-room="links" onclick="switchRoom('links',this)"># links</button>
  <button class="room-btn" data-room="memes" onclick="switchRoom('memes',this)"># memes</button>
  <button class="add-room-btn" onclick="addRoom()">+ room</button>
</div>

<main>
  <div class="stats-bar" id="stats-bar">
    <div class="stat"><span class="stat-val" id="stat-posts">0</span><span class="stat-label">posts</span></div>
    <div class="stat"><span class="stat-val" id="stat-reactions">0</span><span class="stat-label">reactions</span></div>
    <div class="stat"><span class="stat-val" id="stat-comments">0</span><span class="stat-label">comments</span></div>
    <div class="stat"><span class="stat-val" id="stat-top" style="font-size:13px">—</span><span class="stat-label">most active</span></div>
  </div>

  <div class="search-bar">
    <input type="text" id="search-input" placeholder="search posts..." oninput="renderPosts()" />
    <button class="sort-btn active" id="sort-new" onclick="setSort('new')">newest</button>
    <button class="sort-btn" id="sort-top" onclick="setSort('top')">top voted</button>
  </div>

  <div class="typing-bar" id="typing-bar"></div>

  <div class="compose">
    <div class="name-row">
      <input type="text" id="username" placeholder="your name" maxlength="20" oninput="saveUsername();sendTyping()" />
      <input type="color" id="user-color" value="#c8f135" title="your colour" onchange="saveUserColor()" />
    </div>
    <div class="tabs">
      <button class="tab active-note" data-tab="note" onclick="setTab('note')">note</button>
      <button class="tab" data-tab="link" onclick="setTab('link')">link</button>
      <button class="tab" data-tab="image" onclick="setTab('image')">image</button>
      <button class="tab" data-tab="announce" onclick="setTab('announce')">📢 announce</button>
      <button class="tab" data-tab="poll" onclick="setTab('poll')">📊 poll</button>
    </div>
    <div id="compose-area">
      <textarea id="main-input" placeholder="write something..." oninput="sendTyping()"></textarea>
    </div>
    <button class="post-btn" onclick="postItem()">post →</button>
  </div>

  <div class="section-label" id="posts-label">all posts</div>
  <div id="announcements"></div>
  <div id="posts" class="posts"><div class="empty">loading...</div></div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, update, set, get, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDNi4UYpQtjqSp5-v-1i0hFVUINV2_Qh9A",
  authDomain: "board-f23b8.firebaseapp.com",
  databaseURL: "https://board-f23b8-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "board-f23b8",
  storageBucket: "board-f23b8.firebasestorage.app",
  messagingSenderId: "1085038413010",
  appId: "1:1085038413010:web:87af7ce8ff439221e3990b",
  measurementId: "G-FXCJHGSKWP"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const metaRef = ref(db, 'meta');

const EMOJIS = ['👍','❤️','😂','🔥','😮','😢','🎉','💯'];
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function ea(s){ return String(s||'').replace(/"/g,'&quot;'); }
function timeAgo(ts){ const d=Date.now()-ts; if(d<60000)return 'just now'; if(d<3600000)return Math.floor(d/60000)+'m ago'; if(d<86400000)return Math.floor(d/3600000)+'h ago'; return new Date(ts).toLocaleDateString(); }
function fullTime(ts){ return new Date(ts).toLocaleString(); }
function initials(n){ return (n||'?').trim().split(/\s+/).map(w=>w[0].toUpperCase()).slice(0,2).join('')||'?'; }
function textColor(hex){ try{ const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return (r*299+g*587+b*114)/1000>128?'#111':'#eee'; }catch(e){return '#eee';} }
function getScore(p){ const up=p.votes?Object.values(p.votes).filter(v=>v===1).length:0; const dn=p.votes?Object.values(p.votes).filter(v=>v===-1).length:0; return up-dn; }

// persist
const savedName=localStorage.getItem('boardName')||''; const savedColor=localStorage.getItem('boardColor')||'#c8f135';
if(savedName)document.getElementById('username').value=savedName;
document.getElementById('user-color').value=savedColor;
window.saveUsername=()=>localStorage.setItem('boardName',document.getElementById('username').value);
window.saveUserColor=()=>localStorage.setItem('boardColor',document.getElementById('user-color').value);

// session id for online presence
const sessionId = Math.random().toString(36).slice(2);
const myName=()=>(document.getElementById('username').value||'').trim()||'anon';

// password
window.tryUnlock=async function(){
  const pw=document.getElementById('pw-input').value;
  const snap=await get(metaRef); const meta=snap.val()||{};
  const correct=meta.password||'ourboard';
  if(pw===correct){ document.getElementById('lock-screen').style.display='none'; initPresence(); }
  else{ document.getElementById('pw-error').style.display='block'; document.getElementById('pw-input').value=''; }
};

// online presence
function initPresence(){
  const presRef=ref(db,'presence/'+sessionId);
  const updatePresence=()=>set(presRef,{name:myName(),ts:Date.now()});
  updatePresence(); setInterval(updatePresence,15000);
  onValue(ref(db,'presence'),snap=>{
    const val=snap.val()||{}; const now=Date.now();
    const active=Object.values(val).filter(v=>now-v.ts<30000);
    document.getElementById('online-count').textContent='● '+active.length+' online';
  });
  // cleanup on leave
  window.addEventListener('beforeunload',()=>remove(presRef));
}

// typing indicator
let typingTimeout=null;
window.sendTyping=function(){
  const name=myName(); if(!name)return;
  set(ref(db,'typing/'+currentRoom+'/'+sessionId),{name,ts:Date.now()});
  clearTimeout(typingTimeout);
  typingTimeout=setTimeout(()=>remove(ref(db,'typing/'+currentRoom+'/'+sessionId)),2000);
};
function watchTyping(){
  onValue(ref(db,'typing/'+currentRoom),snap=>{
    const val=snap.val()||{}; const now=Date.now();
    const others=Object.entries(val).filter(([id,v])=>id!==sessionId&&now-v.ts<3000).map(([,v])=>v.name);
    const bar=document.getElementById('typing-bar');
    if(others.length===0)bar.textContent='';
    else if(others.length===1)bar.textContent=others[0]+' is typing...';
    else bar.textContent=others.slice(0,-1).join(', ')+' and '+others[others.length-1]+' are typing...';
  });
}

// theme



// board name
window.startEditName=function(){ const t=document.getElementById('logo-text'),e=document.getElementById('logo-edit'); e.value=t.textContent.replace('// ',''); t.style.display='none'; e.style.display='inline-block'; e.focus(); };
window.saveName=function(){ const e=document.getElementById('logo-edit'),t=document.getElementById('logo-text'); const name=e.value.trim()||'our board'; t.textContent='// '+name; t.style.display='inline'; e.style.display='none'; update(metaRef,{boardName:name}); };
onValue(metaRef,snap=>{ const v=snap.val(); if(v&&v.boardName){document.getElementById('logo-text').textContent='// '+v.boardName; document.title=v.boardName;} });

// rooms
let currentRoom='general'; let roomUnsub=null; let allPosts=[]; let lastCount=null; let sortMode='new';
window.switchRoom=function(room,btn){ currentRoom=room; document.querySelectorAll('.room-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); allPosts=[]; lastCount=null; document.getElementById('posts').innerHTML='<div class="empty">loading...</div>'; document.getElementById('announcements').innerHTML=''; subscribeRoom(); watchTyping(); };
window.addRoom=function(){ const name=prompt('room name:'); if(!name)return; const slug=name.toLowerCase().replace(/[^a-z0-9]/g,''); if(!slug)return; const bar=document.getElementById('rooms-bar'),addBtn=bar.querySelector('.add-room-btn'); const btn=document.createElement('button'); btn.className='room-btn'; btn.dataset.room=slug; btn.textContent='# '+slug; btn.onclick=()=>switchRoom(slug,btn); bar.insertBefore(btn,addBtn); switchRoom(slug,btn); };
function subscribeRoom(){ if(roomUnsub)roomUnsub(); const postsRef=ref(db,'rooms/'+currentRoom); roomUnsub=onValue(postsRef,snap=>{ const val=snap.val(); const newPosts=val?Object.entries(val):[]; if(lastCount!==null&&newPosts.length>lastCount){ const newest=[...newPosts].sort((a,b)=>b[1].ts-a[1].ts)[0]; if(newest&&!document.hidden)showToast('📬 '+esc(newest[1].name||'someone')+' posted in #'+currentRoom); if(document.hidden)document.getElementById('notif-btn').classList.add('has-notif'); } lastCount=newPosts.length; allPosts=newPosts; renderPosts(); updateStats(); }); }
subscribeRoom(); watchTyping();

// sort
window.setSort=function(mode){ sortMode=mode; document.getElementById('sort-new').classList.toggle('active',mode==='new'); document.getElementById('sort-top').classList.toggle('active',mode==='top'); renderPosts(); };

// notifications
window.clearNotif=()=>document.getElementById('notif-btn').classList.remove('has-notif');
function showToast(msg){ const old=document.querySelector('.notif-toast'); if(old)old.remove(); const t=document.createElement('div'); t.className='notif-toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3500); }

// stats
function updateStats(){ let reactions=0,comments=0; const names={}; for(const[,p]of allPosts){ if(p.reactions)for(const e of Object.values(p.reactions))reactions+=Object.keys(e).length; if(p.comments)comments+=Object.keys(p.comments).length; names[p.name]=(names[p.name]||0)+1; } document.getElementById('stat-posts').textContent=allPosts.length; document.getElementById('stat-reactions').textContent=reactions; document.getElementById('stat-comments').textContent=comments; const top=Object.entries(names).sort((a,b)=>b[1]-a[1])[0]; document.getElementById('stat-top').textContent=top?top[0]:'—'; }

// tab
let currentTab='note';
window.setTab=function(tab){ currentTab=tab; document.querySelectorAll('.tab').forEach(t=>{t.className='tab'; if(t.dataset.tab===tab)t.classList.add('active-'+tab);}); const area=document.getElementById('compose-area');
if(tab==='note')area.innerHTML='<textarea id="main-input" placeholder="write something..." oninput="sendTyping()"></textarea>';
else if(tab==='link')area.innerHTML='<input type="text" id="main-input" placeholder="https://..." oninput="previewLink(this.value)" /><div id="link-preview-box" class="link-preview"><div class="link-preview-inner"><div class="link-preview-title" id="lp-title"></div><div class="link-preview-desc" id="lp-desc"></div><div class="link-preview-url" id="lp-url"></div></div></div><input type="text" id="extra-input" class="extra-input" placeholder="description (optional)" />';
else if(tab==='image')area.innerHTML='<input type="text" id="main-input" placeholder="image URL (https://...)" oninput="previewImg(this.value)" /><img id="img-preview" class="img-preview" /><input type="text" id="extra-input" class="extra-input" placeholder="caption (optional)" />';
else if(tab==='announce')area.innerHTML='<textarea id="main-input" placeholder="📢 write an announcement..."></textarea>';
else if(tab==='poll')area.innerHTML='<input type="text" id="main-input" placeholder="poll question..." /><div class="poll-options" id="poll-options"><div class="poll-option-row"><input type="text" class="poll-opt-input" placeholder="option 1" /></div><div class="poll-option-row"><input type="text" class="poll-opt-input" placeholder="option 2" /></div></div><button class="add-opt-btn" onclick="addPollOption()">+ add option</button>';
};

window.addPollOption=function(){ const opts=document.getElementById('poll-options'); const idx=opts.children.length+1; const row=document.createElement('div'); row.className='poll-option-row'; row.innerHTML=`<input type="text" class="poll-opt-input" placeholder="option ${idx}" /><button class="remove-opt" onclick="this.parentElement.remove()">✕</button>`; opts.appendChild(row); };
window.previewImg=function(url){ const img=document.getElementById('img-preview'); if(!img)return; if(url.startsWith('http')){img.src=url;img.style.display='block';img.onerror=()=>img.style.display='none';}else img.style.display='none'; };
window.previewLink=function(url){ const box=document.getElementById('link-preview-box'); if(!box)return; if(!url.startsWith('http')){box.style.display='none';return;} document.getElementById('lp-title').textContent=url; document.getElementById('lp-desc').textContent=''; document.getElementById('lp-url').textContent=new URL(url).hostname||url; box.style.display='block'; };

window.postItem=async function(){ const name=myName(); const color=document.getElementById('user-color').value||'#c8f135'; const main=(document.getElementById('main-input')?.value||'').trim(); const extra=(document.getElementById('extra-input')?.value||'').trim(); if(!main)return;
const data={name,color,ts:Date.now(),type:currentTab};
if(currentTab==='note'||currentTab==='announce')data.content=main;
else if(currentTab==='link'){data.url=main;data.label=extra;}
else if(currentTab==='image'){data.url=main;data.caption=extra;}
else if(currentTab==='poll'){ data.question=main; const opts=[...document.querySelectorAll('.poll-opt-input')].map(i=>i.value.trim()).filter(Boolean); if(opts.length<2)return; data.options=opts; }
document.getElementById('main-input').value=''; if(document.getElementById('extra-input'))document.getElementById('extra-input').value=''; if(document.getElementById('img-preview'))document.getElementById('img-preview').style.display='none'; if(document.getElementById('link-preview-box'))document.getElementById('link-preview-box').style.display='none'; if(currentTab==='poll'){document.querySelectorAll('.poll-opt-input').forEach(i=>i.value='');}
remove(ref(db,'typing/'+currentRoom+'/'+sessionId));
await push(ref(db,'rooms/'+currentRoom),data); };

// votes
window.vote=async function(postKey,val){ const name=myName(); const vRef=ref(db,`rooms/${currentRoom}/${postKey}/votes/${btoa(name).replace(/=/g,'')}`); const snap=await get(vRef); if(snap.val()===val)await remove(vRef); else await set(vRef,val); };

// poll vote
window.pollVote=async function(postKey,optIdx){ const name=myName(); await set(ref(db,`rooms/${currentRoom}/${postKey}/pollVotes/${btoa(name).replace(/=/g,'')}`),optIdx); };

// reactions
window.addReaction=async function(postKey,emoji){ closeEmojiPicker(); const name=myName(); const rRef=ref(db,`rooms/${currentRoom}/${postKey}/reactions/${emoji}`); const snap=await get(rRef); const val=snap.val()||{}; const myKey=Object.keys(val).find(k=>val[k]===name); if(myKey)await remove(ref(db,`rooms/${currentRoom}/${postKey}/reactions/${emoji}/${myKey}`)); else await push(ref(db,`rooms/${currentRoom}/${postKey}/reactions/${emoji}`),name); };
let openPicker=null;
function closeEmojiPicker(){if(openPicker){openPicker.remove();openPicker=null;}}
document.addEventListener('click',e=>{if(openPicker&&!openPicker.contains(e.target))closeEmojiPicker();});
window.showEmojiPicker=function(postKey,btn){ closeEmojiPicker(); const picker=document.createElement('div'); picker.className='emoji-picker'; EMOJIS.forEach(emoji=>{const b=document.createElement('button');b.textContent=emoji;b.onclick=ev=>{ev.stopPropagation();addReaction(postKey,emoji);};picker.appendChild(b);}); btn.closest('.reactions-bar').appendChild(picker); openPicker=picker; };

// comments
window.toggleComments=function(postKey){ const sec=document.getElementById('comments-'+postKey); if(!sec)return; sec.style.display=sec.style.display==='none'?'block':'none'; const btn=document.getElementById('toggle-btn-'+postKey); if(btn){const c=sec.querySelectorAll('.comment').length; btn.textContent=sec.style.display==='none'?(c>0?c+' comment'+(c!==1?'s':''):'add comment'):'hide';} };
window.postComment=async function(postKey){ const name=myName(); const color=document.getElementById('user-color').value||'#c8f135'; const input=document.getElementById('comment-input-'+postKey); const text=(input?.value||'').trim(); if(!text)return; await push(ref(db,`rooms/${currentRoom}/${postKey}/comments`),{name,color,text,ts:Date.now()}); input.value=''; };
window.deleteComment=async function(postKey,ck){ await remove(ref(db,`rooms/${currentRoom}/${postKey}/comments/${ck}`)); };
window.togglePin=async function(postKey,cur){ await update(ref(db,`rooms/${currentRoom}/${postKey}`),{pinned:!cur}); };
window.deletePost=async function(postKey){ await remove(ref(db,`rooms/${currentRoom}/${postKey}`)); };
window.startEdit=function(postKey,cur){ const el=document.getElementById('body-'+postKey); if(!el)return; el.innerHTML=`<textarea class="edit-area" id="edit-ta-${postKey}">${esc(cur)}</textarea><div class="edit-actions"><button class="edit-save" onclick="saveEdit('${postKey}')">save</button><button class="edit-cancel" onclick="cancelEdit('${postKey}','${ea(cur)}')">cancel</button></div>`; };
window.saveEdit=async function(postKey){ const ta=document.getElementById('edit-ta-'+postKey); if(!ta)return; const c=ta.value.trim(); if(!c)return; await update(ref(db,`rooms/${currentRoom}/${postKey}`),{content:c,edited:true}); };
window.cancelEdit=function(postKey,orig){ const el=document.getElementById('body-'+postKey); if(!el)return; el.innerHTML=`<div class="card-body">${esc(orig)}</div>`; };

window.renderPosts=function(){ const query=(document.getElementById('search-input')?.value||'').toLowerCase().trim(); const announcementsEl=document.getElementById('announcements'); const container=document.getElementById('posts'); let posts=[...allPosts];
if(query){ posts=posts.filter(([,p])=>[p.name,p.content,p.label,p.url,p.caption,p.question].filter(Boolean).join(' ').toLowerCase().includes(query)); document.getElementById('posts-label').textContent=posts.length+' result'+(posts.length!==1?'s':''); } else { document.getElementById('posts-label').textContent='# '+currentRoom; }
const announces=posts.filter(([,p])=>p.type==='announce'); const regular=posts.filter(([,p])=>p.type!=='announce');
regular.sort((a,b)=>{ if(b[1].pinned&&!a[1].pinned)return 1; if(a[1].pinned&&!b[1].pinned)return -1; if(sortMode==='top')return getScore(b[1])-getScore(a[1]); return b[1].ts-a[1].ts; });
announcementsEl.innerHTML=''; for(const [key,post] of announces) announcementsEl.appendChild(renderAnnounce(post,key));
if(regular.length===0){container.innerHTML='<div class="empty">'+(query?'no results':'no posts yet — say hi!')+'</div>';return;} container.innerHTML=''; for(const [key,post] of regular) container.appendChild(renderPost(post,key)); };

function renderAnnounce(p,key){ const div=document.createElement('div'); div.className='announce-banner'; const [,fg]=colorPair(p.color); div.innerHTML=`<div class="card-meta"><div class="avatar" style="background:${p.color||'#fb923c'};color:${textColor(p.color||'#fb923c')}">${initials(p.name)}</div><span style="font-size:13px;font-weight:500;color:${p.color||'var(--announce)'}">${esc(p.name)}</span><span class="badge badge-announce">announcement</span><span class="card-time" data-full="${ea(fullTime(p.ts))}">${timeAgo(p.ts)}</span><div class="card-actions"><button class="act-btn" onclick="deletePost('${key}')">✕</button></div></div><div class="announce-body">${esc(p.content)}</div>`; return div; }

function colorPair(hex){ const h=hex||'#c8f135'; return [h, textColor(h)]; }

function renderPost(p,key){ const uc=p.color||'#c8f135'; const tc=textColor(uc); const card=document.createElement('div'); card.className='card'+(p.pinned?' pinned':'');
let body='';
if(p.type==='note') body=`<div id="body-${key}"><div class="card-body">${esc(p.content)}${p.edited?'<span style="font-size:11px;color:var(--muted);margin-left:6px">(edited)</span>':''}</div></div>`;
else if(p.type==='link') body=`<div class="card-body"><a href="${ea(p.url)}" target="_blank" rel="noopener">${esc(p.label||p.url)}</a></div>`;
else if(p.type==='image') body=`<div class="card-body">${p.caption?esc(p.caption)+'<br>':''}<img src="${ea(p.url)}" class="card-img" onerror="this.style.display='none'"></div>`;
else if(p.type==='poll'){
  const votes=p.pollVotes?Object.values(p.pollVotes):[];
  const myVote=p.pollVotes?p.pollVotes[btoa(myName()).replace(/=/g,'')]:undefined;
  const total=votes.length||1;
  let opts=''; (p.options||[]).forEach((opt,i)=>{ const cnt=votes.filter(v=>v===i).length; const pct=Math.round(cnt/total*100); opts+=`<div class="poll-opt" onclick="pollVote('${key}',${i})"><div class="poll-opt-bar-wrap"><div class="poll-opt-bar${myVote===i?' voted':''}" style="width:${pct}%"></div><div class="poll-opt-label"><span>${esc(opt)}</span><span class="poll-pct">${pct}%</span></div></div></div>`; });
  body=`<div class="poll-card"><div class="poll-question">${esc(p.question)}</div>${opts}<div style="font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:6px">${votes.length} vote${votes.length!==1?'s':''}</div></div>`;
}
// votes
const score=getScore(p); const myVoteVal=p.votes?p.votes[btoa(myName()).replace(/=/g,'')]:0;
const voteHtml=`<div class="vote-row"><button class="vote-btn${myVoteVal===1?' voted-up':''}" onclick="vote('${key}',1)">▲</button><span class="vote-score" style="color:${score>0?'#4ade80':score<0?'var(--danger)':'var(--muted)'}">${score}</span><button class="vote-btn${myVoteVal===-1?' voted-down':''}" onclick="vote('${key}',-1)">▼</button></div>`;
// reactions
const reactions=p.reactions||{}; const name=myName(); let rxHtml='<div class="reactions-bar">';
for(const [emoji,users] of Object.entries(reactions)){ const cnt=Object.keys(users).length; if(cnt===0)continue; const reacted=Object.values(users).includes(name); rxHtml+=`<button class="reaction-btn${reacted?' reacted':''}" onclick="addReaction('${key}','${emoji}')">${emoji} <span class="reaction-count">${cnt}</span></button>`; }
rxHtml+=`<button class="add-reaction" onclick="showEmojiPicker('${key}',this)">+ react</button></div>`;
// comments
const comments=p.comments||{}; const ces=Object.entries(comments).sort((a,b)=>a[1].ts-b[1].ts); const cc=ces.length;
let cmHtml=`<button class="toggle-comments" id="toggle-btn-${key}" onclick="toggleComments('${key}')">${cc>0?cc+' comment'+(cc!==1?'s':''):'add comment'}</button><div class="comments-section" id="comments-${key}" style="display:none">`;
for(const [ck,c] of ces){ const cc2=c.color||'#c8f135'; cmHtml+=`<div class="comment"><div class="comment-avatar" style="background:${cc2};color:${textColor(cc2)}">${initials(c.name)}</div><div class="comment-content"><span class="comment-name">${esc(c.name)}</span><div class="comment-text">${esc(c.text)}</div></div><button class="comment-del" onclick="deleteComment('${key}','${ck}')">✕</button></div>`; }
cmHtml+=`<div class="comment-form"><input type="text" id="comment-input-${key}" placeholder="write a comment..." onkeydown="if(event.key==='Enter')postComment('${key}')" /><button onclick="postComment('${key}')">send</button></div></div>`;
const editBtn=p.type==='note'?`<button class="act-btn" onclick="startEdit('${key}','${ea(p.content||'')}')">✏️</button>`:'';
card.innerHTML=`${p.pinned?'<div class="pin-label">📌 pinned</div>':''}<div class="card-meta"><div class="avatar" style="background:${uc};color:${tc}">${initials(p.name||'?')}</div><span style="font-size:13px;font-weight:500;color:${uc}">${esc(p.name||'anon')}</span><span class="badge badge-${p.type}">${p.type}</span><span class="card-time" data-full="${ea(fullTime(p.ts))}" title="${ea(fullTime(p.ts))}">${timeAgo(p.ts)}</span><div class="card-actions">${editBtn}<button class="act-btn${p.pinned?' pinned':''}" onclick="togglePin('${key}',${!!p.pinned})">📌</button><button class="act-btn" onclick="deletePost('${key}')">✕</button></div></div>${body}${voteHtml}${rxHtml}${cmHtml}`;
return card; }
</script>
</body>
</html>
